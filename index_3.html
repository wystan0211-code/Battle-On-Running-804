<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Battle On Running</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh;flex-direction:column}.page.active{display:flex}

#page-login{background:linear-gradient(160deg,#1a0000 0%,#2d0000 45%,#1a0800 100%);align-items:center;justify-content:center;padding:2rem;gap:1.5rem}
.logo-img{display:block;width:200px;margin:0 auto;border-radius:14px}
.login-card{background:rgba(255,255,255,0.12);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.25);border-radius:18px;padding:1.5rem;width:100%;max-width:340px}
.login-card h2{font-size:.82rem;margin-bottom:1.2rem;color:rgba(255,255,255,0.7);text-align:center;letter-spacing:2px;text-transform:uppercase}
.fg{margin-bottom:.9rem}
.fg label{display:block;font-size:.75rem;color:#fff;margin-bottom:5px;letter-spacing:1px}
.fg input{width:100%;padding:11px 13px;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.3);border-radius:10px;color:#fff;font-size:.95rem;outline:none}
.fg input:focus{border-color:rgba(255,255,255,0.6)}
.topbar-logo{height:28px;border-radius:7px}

.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:.88rem;font-weight:600;cursor:pointer;transition:transform .1s,opacity .15s;color:#fff}
.btn:active{transform:scale(.97);opacity:.8}
.btn-primary{background:linear-gradient(90deg,#e02020,#f07000)}
.btn-secondary{background:rgba(255,255,255,0.14);color:#fff;border:1px solid rgba(255,255,255,0.25)}
.btn-danger{background:linear-gradient(90deg,#9a1010,#d02020)}
.btn-success{background:linear-gradient(90deg,#0e6e30,#20c050)}
.btn-warn{background:linear-gradient(90deg,#8a3000,#e05000)}
.btn-info{background:linear-gradient(90deg,#083860,#1080c0)}
.btn-gold{background:linear-gradient(90deg,#8a6000,#e0a800)}
.btn-sm{padding:8px 14px;font-size:.8rem;width:auto;border-radius:8px}
.btn-xs{padding:5px 10px;font-size:.7rem;width:auto;border-radius:6px}
.login-error{color:#ff6060;font-size:.78rem;text-align:center;margin-top:.6rem;min-height:1em}

.topbar{background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:6px}
.badge{padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.5px}
.badge-host{background:linear-gradient(90deg,rgba(90,0,140,.8),rgba(150,50,210,.7));color:#fff;border:1px solid rgba(160,60,220,.4)}
.badge-hunter{background:linear-gradient(90deg,rgba(140,20,20,.8),rgba(210,50,50,.7));color:#fff;border:1px solid rgba(220,60,60,.4)}
.badge-runner{background:linear-gradient(90deg,rgba(0,100,80,.8),rgba(20,200,160,.6));color:#fff;border:1px solid rgba(20,200,160,.4)}

.timer-section{background:rgba(0,0,0,0.8);padding:14px 16px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.timer-game-name{font-size:.65rem;color:rgba(255,255,255,0.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.timer-value{font-family:"Courier New",Courier,monospace;font-size:4.8rem;font-weight:900;letter-spacing:6px;line-height:1;color:#ff2020;text-shadow:0 0 24px rgba(255,32,32,.65),0 0 48px rgba(255,32,32,.25)}
.timer-value.paused{color:#ffaa00;text-shadow:0 0 20px rgba(255,170,0,.55)}
.timer-value.stopped{color:#222;text-shadow:none}
.timer-status{font-size:.62rem;margin-top:3px;color:rgba(255,255,255,0.3);letter-spacing:3px;font-family:"Courier New",monospace}

.tabs{display:flex;background:rgba(0,0,0,0.7);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.tab{flex:1;padding:9px 2px;text-align:center;font-size:.62rem;color:rgba(255,255,255,0.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px}
.tab.active{color:#fff;border-bottom-color:#e02020}

.host-content{flex:1;overflow-y:auto;padding:12px 14px}
.sec{font-size:.68rem;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;margin:14px 0 7px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,0.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:7px}
.row{display:flex;gap:7px;margin-bottom:7px;align-items:center}
.ipt{flex:1;padding:9px 11px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:8px;color:#fff;font-size:.88rem;outline:none}
.ipt::placeholder{color:rgba(255,255,255,0.4)}
.ipt:focus{border-color:rgba(255,255,255,0.5)}
.ipt:disabled{color:rgba(255,255,255,0.25);background:rgba(0,0,0,0.3)}
.ipt-w{width:100%;padding:9px 11px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:8px;color:#fff;font-size:.88rem;outline:none;margin-bottom:7px}
.ipt-w::placeholder{color:rgba(255,255,255,0.4)}
.ipt-w:focus{border-color:rgba(255,255,255,0.5)}
select.ipt,select.ipt-w{appearance:none;-webkit-appearance:none}
select.ipt option,select.ipt-w option{background:#1a1a1a;color:#fff}

.pi{background:rgba(255,255,255,0.08);backdrop-filter:blur(4px);border-radius:10px;padding:9px 11px;display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;border:1px solid rgba(255,255,255,0.15)}
.pl{display:flex;align-items:center;gap:9px}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av-h{background:linear-gradient(135deg,rgba(200,30,30,.5),rgba(255,80,80,.3));color:#fff;border:1px solid rgba(255,80,80,.4)}
.av-r{background:linear-gradient(135deg,rgba(0,130,100,.5),rgba(20,220,170,.3));color:#fff;border:1px solid rgba(20,220,170,.4)}
.pn{font-size:.88rem;font-weight:700;color:#fff}
.pm{font-size:.68rem;color:rgba(255,255,255,0.5)}
.bg{display:flex;gap:4px}

.mb{background:rgba(255,255,255,0.07);border-radius:9px;padding:8px 11px;margin-bottom:4px;border:1px solid rgba(255,255,255,0.12)}
.mt_{font-size:.6rem;color:rgba(255,255,255,0.3);float:right;font-family:"Courier New",monospace}
.mx{font-size:.82rem;line-height:1.5;clear:both;padding-top:1px;white-space:pre-line;color:#fff}
.md{border-left:3px solid #e03030}
.ms{border-left:3px solid #20c050}
.mi{border-left:3px solid #2090e0}
.mm{border-left:3px solid #e07000}
.ma{border-left:3px solid rgba(255,255,255,0.25)}

#page-runner{background:linear-gradient(160deg,#040c09 0%,#060f0a 100%)}
.code-box{background:rgba(0,200,160,0.12);backdrop-filter:blur(8px);border:1px solid rgba(0,220,170,0.3);border-radius:16px;padding:1rem;text-align:center;margin:10px 14px}
.code-lbl{font-size:.65rem;color:rgba(0,220,170,0.7);letter-spacing:3px;margin-bottom:6px;font-family:"Courier New",monospace}
.code-val{font-family:"Courier New",Courier,monospace;font-size:3.8rem;font-weight:900;letter-spacing:12px;color:#00e0b0;text-shadow:0 0 16px rgba(0,224,176,.5)}
.r-content{flex:1;overflow-y:auto;padding:10px 14px}

#page-hunter{background:linear-gradient(160deg,#0c0404 0%,#120606 100%)}
.h-content{flex:1;overflow-y:auto;padding:10px 14px}
.cap-box{background:rgba(220,40,40,0.12);backdrop-filter:blur(6px);border:1px solid rgba(220,40,40,0.3);border-radius:12px;padding:.9rem;margin-bottom:9px}
.cap-box label{display:block;font-size:.65rem;color:rgba(255,120,120,0.9);letter-spacing:2px;margin-bottom:7px}
.cap-row{display:flex;gap:7px}
.cap-ipt{flex:1;padding:10px 12px;background:rgba(0,0,0,0.5);border:1px solid rgba(220,40,40,0.4);border-radius:8px;color:#fff;font-size:1.3rem;font-weight:700;letter-spacing:6px;text-align:center;outline:none;font-family:"Courier New",monospace}
.cap-ipt::placeholder{color:rgba(255,255,255,0.3)}
.cap-ipt:disabled{color:rgba(255,255,255,0.2);border-color:rgba(100,100,100,0.2)}
.call-note{background:rgba(32,144,224,0.1);border:1px solid rgba(32,144,224,0.25);border-radius:8px;padding:7px;font-size:.72rem;color:rgba(120,180,255,0.9);text-align:center;margin-bottom:9px}

.wait-scr{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:.8rem}
.wait-av{width:72px;height:72px;border-radius:50%;overflow:hidden;margin-bottom:.4rem;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700}
.wait-name{font-size:1.7rem;font-weight:800;color:#fff}
.wait-big{font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:1px}
.wait-sub{font-size:.88rem;color:rgba(255,255,255,0.45);letter-spacing:.5px}

/* CIRCLES - larger, no denominator for hunters */
.circles-area{padding:10px 14px 6px;display:flex;align-items:flex-start;justify-content:center;gap:20px;flex-wrap:wrap}
.sc-wrap{display:flex;flex-direction:column;align-items:center}
.sc-lbl{font-size:.65rem;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-top:4px;text-align:center;font-family:"Courier New",monospace}

/* COUNTDOWN WAITING OVERLAY */
.wait-countdown-overlay{position:fixed;inset:0;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.wco-bg{position:absolute;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(6px)}
.wco-box{position:relative;z-index:2;background:rgba(255,255,255,0.12);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:2rem 2.5rem;max-width:320px;width:100%}
.wco-cd{font-family:"Courier New",monospace;font-size:3.2rem;font-weight:900;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.5);margin:1rem 0}
.wco-label{font-size:.68rem;color:rgba(255,255,255,0.55);letter-spacing:3px;text-transform:uppercase;margin-bottom:.5rem}
.wco-info{font-size:.8rem;color:rgba(255,255,255,0.9);margin-top:1rem;line-height:1.6}
.wco-meta{font-size:.72rem;color:rgba(255,255,255,0.55);margin-top:.4rem}

.go-scr{position:fixed;inset:0;background:linear-gradient(160deg,#160000,#240000,#160300);z-index:9800;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.go-title{font-family:"Courier New",monospace;font-size:3.4rem;font-weight:900;color:#ff4040;letter-spacing:4px}
.go-prison{font-size:1.1rem;color:#fff;margin-top:1rem;font-weight:600}
.go-sub{font-size:.82rem;color:rgba(255,255,255,0.45);margin-top:.4rem}

.rel-scr{position:fixed;inset:0;z-index:9900;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.rel-ripple{position:absolute;inset:0;animation:ripA 1.8s ease forwards}
@keyframes ripA{0%{background:radial-gradient(circle at center,#c02020 0%,#160000 70%)}50%{background:radial-gradient(circle at center,#e08000 0%,#160600 70%)}100%{background:radial-gradient(circle at center,#00e0a0 0%,#001810 70%)}}
.rel-cnt{position:relative;z-index:2}
.rel-lock{font-size:4rem;display:block;animation:ulk 1s .4s both}
@keyframes ulk{0%{transform:rotate(-25deg) scale(.4);opacity:0}60%{transform:rotate(10deg) scale(1.2)}100%{transform:rotate(0) scale(1);opacity:1}}
.rel-title{font-size:2.3rem;font-weight:900;color:#fff;letter-spacing:2px;animation:fUp 1s .7s both}
.rel-sub{font-size:.95rem;color:rgba(255,255,255,0.7);animation:fUp 1s .9s both}
@keyframes fUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.frz-scr{position:fixed;inset:0;background:rgba(0,5,16,0.96);z-index:9950;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.frz-cd{font-family:"Courier New",monospace;font-size:6rem;font-weight:900;color:#40a0ff;text-shadow:0 0 30px rgba(64,160,255,.8)}
.frz-ttl{font-size:1.05rem;color:rgba(255,255,255,0.6);margin-bottom:1rem;letter-spacing:2px}

.ann-fs{position:fixed;inset:0;z-index:9500;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden}
.ann-bg{position:absolute;inset:0;background:linear-gradient(135deg,#160000,#280000)}
.ann-parts{position:absolute;inset:0;pointer-events:none}
.pt{position:absolute;border-radius:50%;opacity:0;animation:ptF linear infinite}
@keyframes ptF{0%{opacity:0;transform:translateY(100vh)}10%{opacity:.9}90%{opacity:.9}100%{opacity:0;transform:translateY(-50px) translateX(20px)}}
.ann-inner{position:relative;z-index:2;animation:aIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes aIn{from{transform:scale(.7) translateY(-30px);opacity:0}to{transform:scale(1);opacity:1}}
.ann-lbl{font-size:.65rem;letter-spacing:4px;color:rgba(255,255,255,0.45);margin-bottom:10px;text-transform:uppercase}
.ann-txt{font-size:1.5rem;font-weight:800;line-height:1.3;color:#fff;margin-bottom:6px}
.ann-sub{font-size:.82rem;color:rgba(255,255,255,0.6)}
.ann-exit{animation:aOut .9s ease forwards}
@keyframes aOut{0%{transform:translateX(0) skewX(0);opacity:1}100%{transform:translateX(110vw) skewX(-12deg);opacity:0}}

.toast-ov{position:fixed;inset:0;z-index:9200;pointer-events:none;display:flex;align-items:center;justify-content:center}
.toast-box{background:rgba(0,0,0,0.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.2);border-radius:14px;padding:1.1rem 1.6rem;transform:skewX(-4deg) scale(.9);opacity:0;animation:tIn .4s cubic-bezier(.34,1.56,.64,1) forwards,tOut .5s ease 3s forwards;max-width:82vw;text-align:center}
@keyframes tIn{from{transform:skewX(-4deg) scale(.7) translateY(-20px);opacity:0}to{transform:skewX(-4deg) scale(1);opacity:1}}
@keyframes tOut{from{opacity:1;transform:skewX(-4deg) scale(1)}to{opacity:0;transform:skewX(-8deg) scale(.9) translateX(60px)}}
.toast-txt{font-size:.95rem;font-weight:800;font-style:italic;color:#fff;letter-spacing:.5px}
.toast-sub{font-size:.72rem;color:rgba(255,255,255,0.6);margin-top:3px}

.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.pr-btn{padding:20px 10px;border-radius:12px;border:none;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .3s;color:#fff}
.pr-red{background:linear-gradient(135deg,rgba(180,20,20,.85),rgba(100,8,8,.9));border:1px solid rgba(220,60,60,.4)}
.pr-green{background:linear-gradient(135deg,rgba(20,120,50,.85),rgba(8,60,25,.9));border:1px solid rgba(40,200,80,.4)}
.pr-sub{font-size:.62rem;opacity:.75;display:block;margin-top:3px}

.rel-fab{position:fixed;bottom:22px;right:18px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#0e6030,#20b050);border:none;color:#fff;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;font-weight:700;box-shadow:0 4px 18px rgba(20,160,60,.5)}

.m-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:8000;display:flex;align-items:flex-end}
.m-box{background:linear-gradient(160deg,#0e0e0e,#161616);border-radius:20px 20px 0 0;width:100%;padding:1.4rem;max-height:88vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,0.12)}
.m-handle{width:34px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 1.1rem}
.m-title{font-size:1rem;font-weight:700;margin-bottom:.9rem;letter-spacing:.3px;color:#fff}

.rpt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-height:44vh;overflow-y:auto;margin-bottom:10px}
.rpt-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:border-color .2s}
.rpt-card.sel{border-color:#00e0b0;background:rgba(0,224,176,0.1)}
.rc-av{width:44px;height:44px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;background:rgba(0,200,160,0.2);color:#00e0b0;border:1px solid rgba(0,200,160,0.3)}
.rc-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.rc-nm{font-size:.72rem;color:#fff;text-align:center;word-break:break-all}

.imm-btn{background:linear-gradient(120deg,rgba(20,60,120,.75),rgba(40,110,190,.55));backdrop-filter:blur(8px);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer;border:1px solid rgba(120,180,255,.3)}
.imm-medal{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f9e07a,#c8a400,#8a6a00);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;box-shadow:0 2px 10px rgba(200,164,0,.5)}
.imm-txt{color:#fff;font-weight:700;font-size:1rem}
.imm-sub{font-size:.68rem;color:rgba(255,255,255,0.55);margin-top:2px}
.imm-page{position:fixed;inset:0;background:linear-gradient(160deg,#040a18,#080e28);z-index:8500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;overflow-y:auto}
.medal-wrap{width:130px;height:130px;perspective:600px;margin:1rem auto;cursor:pointer}
.medal-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .7s}
.medal-inner.flipped{transform:rotateY(180deg)}
.medal-f,.medal-b{position:absolute;inset:0;border-radius:50%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900}
.medal-f{background:radial-gradient(circle at 35% 30%,#f9e07a,#c8a400,#8a6a00);color:#5a3a00;font-size:.82rem}
.medal-b{background:radial-gradient(circle at 35% 30%,rgba(80,150,255,.9),rgba(30,80,200,.9));color:#fff;font-size:1.6rem;letter-spacing:6px;font-family:"Courier New",monospace;transform:rotateY(180deg)}

.ph-wrap{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.ph-prev{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:rgba(255,255,255,0.5);flex-shrink:0}
.ph-prev img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ph-btn{flex:1;padding:9px;background:rgba(255,255,255,0.06);border:1px dashed rgba(255,255,255,0.2);border-radius:8px;color:rgba(255,255,255,0.6);font-size:.75rem;text-align:center;cursor:pointer}
.ph-inp{display:none}

.lb-item{background:rgba(255,255,255,0.06);border-radius:9px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;border:1px solid rgba(255,255,255,0.1)}
.lb-rank{font-size:.82rem;font-weight:700;color:rgba(255,255,255,0.4);width:18px}
.lb-nm{font-size:.82rem;font-weight:700;color:#fff}
.lb-cnt{font-size:1rem;font-weight:700;color:#00e0b0}

.pwd-entry{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.pwd-code{font-family:"Courier New",monospace;font-size:.95rem;letter-spacing:3px;flex:1;color:#f1c40f;font-weight:700}

.mg-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.mg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.mg-name{font-size:.92rem;font-weight:700;color:#fff}
.mg-meta{font-size:.68rem;color:rgba(255,255,255,0.5);margin-top:2px}
.mg-members{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.mg-tag{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:3px 8px;font-size:.7rem;color:rgba(255,255,255,0.75)}
.mg-tag-h{border-color:rgba(255,80,80,.4);color:rgba(255,140,140,.9)}
.mg-tag-r{border-color:rgba(0,220,170,.4);color:rgba(0,220,170,.9)}

.bcast{position:fixed;inset:0;background:#060606;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.bcast .bt{font-size:1.8rem;font-weight:800;line-height:1.4;white-space:pre-line;color:#fff}
.bcast .bs{font-size:.85rem;color:rgba(255,255,255,0.5);margin-top:.9rem}

.aw{padding:8px 11px;border-radius:8px;font-size:.78rem;margin-bottom:7px}
.aw-w{background:rgba(220,100,0,0.15);border:1px solid rgba(220,100,0,0.3);color:rgba(255,180,80,0.9)}
.tag{display:inline-block;padding:2px 7px;border-radius:7px;font-size:.65rem;font-weight:700;margin:2px}
.tg-g{background:rgba(0,220,170,0.15);color:#00e0b0;border:1px solid rgba(0,220,170,0.25)}
.tg-r{background:rgba(220,50,50,0.15);color:#ff6060;border:1px solid rgba(220,50,50,0.25)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.shake{animation:shk .35s}
@keyframes shk{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
.tmut{color:rgba(255,255,255,0.35);font-size:.78rem}
.div{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:10px 0}
.mt1{margin-top:7px}.mt2{margin-top:14px}.mb1{margin-bottom:7px}

/* ── EXTRA FEATURES ── */
.timer-value{font-family:'Courier New',Courier,monospace;font-weight:900;font-size:5.5rem;letter-spacing:4px;transition:color .4s;line-height:1}
.timer-value.running{color:#FFD700}
.timer-value.paused{color:#ffffff}
.timer-value.danger{color:#ff2020}
.timer-value.stopped{color:rgba(255,255,255,0.4)}
.topbar{display:flex;align-items:center;padding:10px 14px;background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.15);flex-shrink:0}
.topbar-logo{height:38px;border-radius:7px;object-fit:contain}
.topbar-brand{font-size:1rem;font-weight:900;color:#fff;letter-spacing:1px;white-space:nowrap;margin-left:8px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hunter-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3)}
.hunter-tab{flex:1;padding:11px 0;text-align:center;font-size:.85rem;color:rgba(255,255,255,0.45);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.hunter-tab.active{color:#fff;border-bottom-color:#ff3030;font-weight:700}
.circles-area{padding:10px 14px 6px;display:flex;align-items:flex-start;justify-content:center;gap:20px;flex-wrap:wrap}
.sc-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.para-toast{position:fixed;top:80px;left:-120%;z-index:9000;display:flex;align-items:center;pointer-events:none}
.para-badge{width:8px;align-self:stretch;transform:skewX(-12deg);margin-right:0;min-height:48px}
.para-body{background:#fff;color:#111;padding:12px 28px 12px 12px;transform:skewX(-12deg);box-shadow:4px 4px 18px rgba(0,0,0,.35)}
.para-inner{transform:skewX(12deg);font-size:.95rem;font-weight:800;letter-spacing:.5px}
.para-sub{font-size:.75rem;font-weight:500;color:#444;margin-top:3px}
@keyframes paraIn{0%{left:-120%}65%{left:8px}75%{left:2px}100%{left:8px}}
@keyframes paraOut{0%{left:8px}100%{left:110%}}
.msg-item{border-radius:10px;margin-bottom:6px;overflow:hidden;cursor:pointer}
.msg-item-header{display:flex;align-items:center;gap:8px;padding:9px 12px}
.msg-item-body{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.msg-item-body.open{max-height:300px;padding:6px 12px 10px}
.msg-arrow{margin-left:auto;font-size:.75rem;transition:transform .2s;color:rgba(255,255,255,0.4);flex-shrink:0}
.msg-arrow.open{transform:rotate(180deg)}
.mc-scr{position:fixed;inset:0;z-index:8500;background:#006622;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.mc-title{font-size:2.2rem;font-weight:900;color:#fff;letter-spacing:2px}
.mc-sub{font-size:1rem;color:rgba(255,255,255,0.7)}
.mc-lock-wrap{width:120px;height:120px}
.pm,.tmut,.mg-meta,.ann-lbl{font-size:.9rem!important}
.pn{font-size:1rem}
.sec{font-size:1rem}
.mx{font-size:.92rem}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.sync-ok{background:#20c050;box-shadow:0 0 6px rgba(32,192,80,.8)}
.sync-err{background:#ff4040;box-shadow:0 0 6px rgba(255,64,64,.8)}
.sync-wait{background:#ffcc00;box-shadow:0 0 6px rgba(255,204,0,.8);animation:syncPulse 1s infinite}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-gold{background:linear-gradient(90deg,#8a6000,#e0a800)}</style>

</head>

// ── FIREBASE SYNC ──────────────────────────────────────────────────────
function fbPath(){ return _db.ref('game/state'); }

function fbSave(){
  if(S.currentUser && S.currentUser.role !== 'host') return;
  if(S._fbThrottle) clearTimeout(S._fbThrottle);
  S._fbThrottle = setTimeout(()=>{
    const snap = {
      accounts: S.accounts,
      memoryGroups: S.memoryGroups,
      gameName: S.gameName,
      timerSec: S.timerSec,
      timerRunning: S.timerRunning,
      gameStarted: S.gameStarted,
      paused: S.paused,
      messages: S.messages,
      hostOnlyMsgs: S.hostOnlyMsgs,
      hunterMsgs: S.hunterMsgs,
      hunterChat: S.hunterChat,
      reports: S.reports,
      reportEnabled: S.reportEnabled,
      reportLocations: S.reportLocations,
      prisonCounter: S.prisonCounter,
      missions: S.missions,
      activeMission: S.activeMission || null,
      immunityCards: S.immunityCards,
      pendingReport: S.pendingReport,
      reportSuccessCount: S.reportSuccessCount,
      totalCaught: S.totalCaught,
      savedAt: Date.now()
    };
    fbPath().set(snap).catch(e => console.warn('FB save err:', e));
    // Also save to localStorage as backup
    try { localStorage.setItem('bor_state', JSON.stringify(snap)); } catch(e){}
  }, 300);
}

function fbListen(){
  if(S._fbListening) return;
  S._fbListening = true;
  fbPath().on('value', snap => {
    if(!snap.exists()) return;
    const d = snap.val();
    if(!d) return;
    // Only non-host players receive updates
    if(S.currentUser && S.currentUser.role === 'host') return;
    applyRemoteState(d);
  });
}

function applyRemoteState(d){
  const prevGameStarted = S.gameStarted;
  const prevPaused = S.paused;
  const prevTimerRunning = S.timerRunning;
  S.accounts = d.accounts || S.accounts;
  S.memoryGroups = d.memoryGroups || [];
  S.gameName = d.gameName || '';
  S.timerSec = d.timerSec || 0;
  S.timerRunning = d.timerRunning || false;
  S.gameStarted = d.gameStarted || false;
  S.paused = d.paused || false;
  S.messages = d.messages || [];
  S.hostOnlyMsgs = d.hostOnlyMsgs || [];
  S.hunterMsgs = d.hunterMsgs || [];
  S.hunterChat = d.hunterChat || [];
  S.reports = d.reports || [];
  S.reportEnabled = d.reportEnabled || false;
  S.reportLocations = d.reportLocations || [];
  S.prisonCounter = d.prisonCounter || 0;
  S.missions = d.missions || [];
  S.activeMission = d.activeMission || null;
  S.immunityCards = d.immunityCards || {};
  S.pendingReport = d.pendingReport || {};
  S.reportSuccessCount = d.reportSuccessCount || {};
  S.totalCaught = d.totalCaught || 0;

  // Re-sync currentUser from updated accounts
  if(S.currentUser){
    const updated = S.accounts.find(a => a.username === S.currentUser.username);
    if(updated) S.currentUser = updated;
  }

  // ── 非主辦人端：根據遠端狀態啟動/停止本地計時 interval ──
  if(S.currentUser && S.currentUser.role !== 'host'){
    if(S.timerRunning && !prevTimerRunning){
      // 遠端開始計時 → 啟動本地 interval 跟著倒數
      if(S.timerInterval) clearInterval(S.timerInterval);
      S.timerInterval = setInterval(function(){
        if(S.timerRunning && S.timerSec > 0){
          S.timerSec--;
          updateTimerUI();
          if(S.timerSec === 0){
            clearInterval(S.timerInterval); S.timerInterval = null;
            S.timerRunning = false;
          }
        } else if(!S.timerRunning){
          clearInterval(S.timerInterval); S.timerInterval = null;
        }
      }, 1000);
    } else if(!S.timerRunning && prevTimerRunning){
      // 遠端停止/暫停 → 清掉本地 interval
      if(S.timerInterval){ clearInterval(S.timerInterval); S.timerInterval = null; }
    } else if(S.timerRunning && prevTimerRunning){
      // 持續運行中：Firebase 推送的 timerSec 為基準，已直接更新，interval 繼續即可
    }
  }

  updateTimerUI(); updateCircles();
  if(S.currentUser){
    if(!prevGameStarted && S.gameStarted) revealGameScreens();
    if(S.currentUser.role === 'runner'){
      renderMsgEl('runner-messages','runner');
      updateRunnerMissionPwd(); renderImmunityCard(); updateRunnerReportCount();
      if(S.currentUser.caught || S.currentUser.dead) showGameOver(S.currentUser);
    } else if(S.currentUser.role === 'hunter'){
      renderMsgEl('hunter-messages','hunter');
      renderHunterChat();
    }
    setPauseState();
    if(S.reportEnabled && S.currentUser.role === 'runner'){
      const rw = $('runner-report-wrap'); if(rw) rw.style.display='block';
    }
  }
}

// Load state from Firebase (for host rejoining)
async function fbLoad(){
  try {
    const snap = await fbPath().once('value');
    if(snap.exists()) return snap.val();
  } catch(e){}
  // Fallback to localStorage
  try {
    const s = localStorage.getItem('bor_state');
    if(s) return JSON.parse(s);
  } catch(e){}
  return null;
}

function genCode(){
  const used = new Set(S.accounts.map(a=>a.code).filter(Boolean));
  Object.values(S.immunityCards).flat().forEach(ic=>{ if(ic.code) used.add(ic.code); });
  if(S.activeMission) S.activeMission.passwords.forEach(p=>{ if(p.code) used.add(p.code); });
  let c; do { c = String(Math.floor(1000+Math.random()*9000)); } while(used.has(c));
  return c;
}
function genPwdCode(){
  const L = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const used = new Set(S.activeMission ? S.activeMission.passwords.map(p=>p.code) : []);
  let c; do { c = Array.from({length:4},()=>L[Math.floor(Math.random()*L.length)]).join(''); } while(used.has(c));
  return c;
}

async function doLogin(){
  const u = $('login-user').value.trim(), p = $('login-pass').value.trim();
  // For non-host, load latest from Firebase first
  if(u !== 'host'){
    fbListen();
    // Attempt login with current state, then re-check after listen fires
  }
  const a = S.accounts.find(x => x.username===u && x.password===p && !x.removed);
  if(!a){
    // Try loading from Firebase
    const remote = await fbLoad();
    if(remote){
      const ra = (remote.accounts||[]).find(x=>x.username===u && x.password===p && !x.removed);
      if(ra){
        applyRemoteState(remote);
        S.currentUser = S.accounts.find(x=>x.username===u);
        proceedLogin(S.currentUser);
        return;
      }
    }
    $('login-error').textContent = '帳號或密碼錯誤';
    const card = document.querySelector('.login-card');
    card.classList.add('shake'); setTimeout(()=>card.classList.remove('shake'),400);
    return;
  }
  S.currentUser = a;
  // Host: load saved state
  if(a.role === 'host'){
    const saved = await fbLoad();
    if(saved){
      // Restore state but keep host account
      const hostAcc = S.accounts.find(x=>x.role==='host');
      S.accounts = saved.accounts || S.accounts;
      // Ensure host acc is always updated
      const hi = S.accounts.findIndex(x=>x.role==='host');
      if(hi>=0) S.accounts[hi] = {...S.accounts[hi], password: hostAcc.password};
      S.memoryGroups = saved.memoryGroups||[];
      S.gameName = saved.gameName||'';
      S.timerSec = saved.timerSec||0;
      S.timerRunning = false; // Don't auto-resume timer
      S.gameStarted = saved.gameStarted||false;
      S.paused = saved.paused||false;
      S.messages = saved.messages||[];
      S.hostOnlyMsgs = saved.hostOnlyMsgs||[];
      S.hunterMsgs = saved.hunterMsgs||[];
      S.hunterChat = saved.hunterChat||[];
      S.reports = saved.reports||[];
      S.reportEnabled = saved.reportEnabled||false;
      S.reportLocations = saved.reportLocations||[];
      S.prisonCounter = saved.prisonCounter||0;
      S.missions = saved.missions||[];
      S.activeMission = saved.activeMission||null;
      S.immunityCards = saved.immunityCards||{};
      S.pendingReport = saved.pendingReport||{};
      S.reportSuccessCount = saved.reportSuccessCount||{};
      S.totalCaught = saved.totalCaught||0;
      S.currentUser = S.accounts.find(x=>x.role==='host');
    }
  }
  proceedLogin(S.currentUser);
}

async function proceedLogin(a){
  if(!a) return;
  if(a.role==='host'){ showPage('page-host'); initHost(); }
  else if(a.role==='hunter'){ showPage('page-hunter'); initHunter(); fbListen(); }
  else { showPage('page-runner'); initRunner(); fbListen(); }
}

// ── WAITING COUNTDOWN ──────────────────────────────────────────────────
function checkShowWaitingCountdown(){
  const u = S.currentUser; if(!u || u.role==='host') return;
  let targetTime=null, groupName='';
  S.memoryGroups.forEach(g=>{
    if(g.gameTime && g.members && g.members.some(m=>m.username===u.username)){
      const t = new Date(g.gameTime).getTime();
      if(t>Date.now() && (targetTime===null||t<targetTime)){ targetTime=t; groupName=g.name; }
    }
  });
  if(!targetTime) return;
  showWaitingCountdown(targetTime, groupName);
}
function showWaitingCountdown(targetTime, groupName){
  document.querySelectorAll('.wco-overlay').forEach(e=>e.remove());
  if(S.wcoInterval){ clearInterval(S.wcoInterval); S.wcoInterval=null; }
  const group = S.memoryGroups.find(g=>g.name===groupName);
  const totalPlayers = group?group.members.length:0;
  const dt = new Date(targetTime);
  const dateStr = dt.getFullYear()+'/'+(dt.getMonth()+1)+'/'+dt.getDate()+' '+pad(dt.getHours())+':'+pad(dt.getMinutes());
  const ov = $('overlay-root');
  const div = document.createElement('div'); div.className='wco-overlay';
  div.style.cssText='position:fixed;inset:0;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem';
  div.innerHTML='<div class="wco-bg"></div><div class="wco-box"><div class="wco-label">遊戲尚未開始</div><div id="wco-cd" class="wco-cd">--:--:--</div><div class="wco-info">遊戲名稱：'+groupName+'<br>參賽人數：'+totalPlayers+' 人</div><div class="wco-meta">預定時間：'+dateStr+'</div></div>';
  ov.appendChild(div);
  function tick(){
    const diff = targetTime - Date.now();
    if(diff<=0){ clearInterval(S.wcoInterval); S.wcoInterval=null; div.remove(); return; }
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    const cdEl=$('wco-cd'); if(cdEl) cdEl.textContent=pad(h)+':'+pad(m)+':'+pad(s);
  }
  tick(); S.wcoInterval=setInterval(tick,1000);
}

// ── TIMER ──────────────────────────────────────────────────────────────
function fmtTime(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60; return h>0?pad(h)+':'+pad(m)+':'+pad(ss):pad(m)+':'+pad(ss); }
function startTimer(){
  if(S.timerRunning) return;
  S.gameStarted=true; S.timerRunning=true; S.paused=false; S._warned3min=false;
  document.querySelectorAll('.wco-overlay').forEach(e=>e.remove());
  if(S.wcoInterval){ clearInterval(S.wcoInterval); S.wcoInterval=null; }
  revealGameScreens();
  S.timerInterval=setInterval(function(){
    if(S.timerRunning && S.timerSec>0){
      S.timerSec--; updateTimerUI();
      // 3-min warning
      if(S.timerSec===180 && !S._warned3min){
        S._warned3min=true;
        showParaToast('剩餘 3 分鐘','遊戲即將結束','warn');
      }
      if(S.timerSec===0){ stopTimer(); broadcast({text:'遊戲時間結束',style:'danger',type:'system'}); showBcast('時間到','遊戲結束，請等待主辦人公布結果',0); }
    }
  },1000);
  updateTimerUI(); updateCircles(); setPauseState(); fbSave();
}
function pauseTimer(){ S.timerRunning=false; S.paused=true; if(S.timerInterval){ clearInterval(S.timerInterval); S.timerInterval=null; } updateTimerUI(); setPauseState(); fbSave(); }
function stopTimer(){ S.timerRunning=false; S.paused=false; if(S.timerInterval){ clearInterval(S.timerInterval); S.timerInterval=null; } updateTimerUI(); setPauseState(); }
function setPauseState(){
  const frozen = S.paused;
  const ph = frozen?'時間暫停':'0000';
  const ci=$('capture-input'), cb=$('capture-btn');
  if(ci){ ci.disabled=frozen; ci.placeholder=frozen?'時間暫停，目前不開放':ph; }
  if(cb) cb.disabled=frozen;
  const hi=$('hunter-chat-input'), hs=$('hunter-send-btn');
  if(hi){ hi.disabled=frozen; hi.placeholder=frozen?'時間暫停':' 傳送...'; }
  if(hs) hs.disabled=frozen;
  const rb=$('runner-report-wrap');
  if(rb){ const btn=rb.querySelector('button'); if(btn) btn.disabled=frozen; }
}
function revealGameScreens(){
  ['runner','hunter'].forEach(function(r){
    const w=$(r+'-waiting'), g=$(r+'-game');
    if(w) w.style.display='none'; if(g) g.style.display='flex';
  });
}
function updateTimerUI(){
  const t = fmtTime(S.timerSec);
  let cls;
  if(S.timerSec<=180 && (S.timerRunning||S.paused||S.timerSec>0)) cls='danger';
  else if(S.timerRunning) cls='running';
  else if(S.paused) cls='paused';
  else cls='stopped';
  const stat = S.timerRunning?'RUNNING':S.paused?'PAUSED':'STANDBY';
  const gn = S.gameName||'—';
  [['host-timer','host-timer-status','host-game-name-display'],
   ['runner-timer','runner-timer-status','runner-game-name'],
   ['hunter-timer','hunter-timer-status','hunter-game-name']].forEach(function(arr){
    const te=$(arr[0]),se=$(arr[1]),ne=$(arr[2]);
    if(te){ te.className='timer-value '+cls; te.textContent=t; }
    if(se) se.textContent=stat;
    if(ne) ne.textContent=gn;
  });
}

    ' stroke-dasharray="'+dash+' '+gap+'" stroke-dashoffset="'+dashOff+'" stroke-linecap="round" style="transition:stroke-dasharray .5s"/>'+
    inner+'</svg>'+

function updateCircles(){
  const ar=aliveRunners().length, tr=getRunners().length;
  const ah=aliveHunters().length, th=getHunters().length;
  let html = circSVG_runner(ar,tr) + circSVG_hunter(ah,th);

    const done=S.activeMission.passwords.filter(p=>p.done).length;

  }
  ['host-circles','runner-circles','hunter-circles'].forEach(function(id){

// ── CAPTURE ────────────────────────────────────────────────────────────
function doCapture(){
  if(S.paused) return;
  const el=$('capture-input'); const raw=(el.value||'').trim(); el.value='';
  const isNum = /^\d+$/.test(raw);
  const isAlpha = /^[A-Za-z]+$/.test(raw);
  if(raw.length!==4 || (!isNum && !isAlpha)){
    el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),400); return;
  }
  const code = isAlpha ? raw.toUpperCase() : raw;

  // Check immunity card
  let foundImm=false;
  Object.keys(S.immunityCards).forEach(uid=>{
    if(foundImm) return;
    const ic=S.immunityCards[uid].find(c=>c.code===code&&!c.used);
    if(ic){
      foundImm=true; ic.used=true;
      const target=accOf(uid), hunter=S.currentUser;
      S.hostOnlyMsgs.unshift({text:'免死金牌觸發：'+(target?target.displayName:'?')+' 的金牌被獵人 '+(hunter?hunter.displayName:'?')+' 輸入，觸發30秒緩衝',time:nowStr()});
      showFreezeScr(30,'目標已使用免死金牌 — 禁止移動');
      showParaToast('免死金牌啟動','30秒緩衝中','info');
      renderImmunityCard();
      if(S.hostTabIdx===0) renderHost();
      fbSave();
    }
  });
  if(foundImm) return;

  // Check mission password (alpha only)
  if(isAlpha && S.activeMission && S.activeMission.pwdRequired){
    const pwd=S.activeMission.passwords.find(p=>p.code===code&&!p.done);
    if(pwd){
      const user=S.currentUser;
      if(S.activeMission.passwords.some(p=>p.done&&p.usedBy===user.username)){ pushHunterMsg('你已輸入過一組任務密碼',true); return; }
      pwd.done=true; pwd.usedBy=user.username; updateCircles(); updateRunnerMissionPwd();
      const done=S.activeMission.passwords.filter(p=>p.done).length;
      if(done===S.activeMission.passwords.length){
        // Mission complete
        const rewType=S.activeMission.rewType;
        S.activeMission=null;
        updateCircles();
        updateRunnerMissionPwd();
        showMissionCompleteScr();
        broadcast({text:'任務完成！所有密碼已輸入',style:'success',type:'mission'});
        setTimeout(()=>{
          applyMissionReward(rewType);
          const rewMap={time5:'加5分鐘',time10:'加10分鐘',shrink5:'縮短5分鐘',revive1:'隨機復活1名逃亡者',revive2:'隨機復活2名逃亡者',del1:'移除1名獵人',del2:'移除2名獵人'};
          broadcast({text:'任務獎勵：'+rewMap[rewType],style:'success',type:'mission'});
        },1);
      } else {
        broadcast({text:'任務密碼進度：'+done+'/'+S.activeMission.passwords.length,style:'info',type:'mission'});
      }
      fbSave(); return;
    }
  }

  // Number: capture runner
  if(!isNum){ pushHunterMsg('代碼 '+code+' 無效',true); return; }
  const runner=getRunners().find(r=>r.code===code&&!r.caught&&!r.dead);
  if(!runner){ pushHunterMsg('代碼 '+code+' 無效或已被捕',true); return; }
  runner.caught=true; S.totalCaught++;
  const elapsed=fmtTime(S.timerSec); const hunterName=S.currentUser?S.currentUser.displayName:'獵人';
  showParaToast('抓到 '+runner.displayName,'代碼 #'+runner.code,'danger');
  broadcastCapture(
    runner.displayName+'（#'+runner.code+'）已被 '+hunterName+' 抓捕，存活時間：'+elapsed,
    runner.displayName+' 已被 '+hunterName+' 抓捕',
    runner.username+' 已被抓捕'
  );
  checkReportCapture(runner.username);
  if(S.currentUser&&S.currentUser.username===runner.username) showGameOver(runner);
  updateCircles(); pushHunterMsg('成功抓捕 '+runner.displayName+' (#'+runner.code+')',true);
  if(S.hostTabIdx===0||S.hostTabIdx===1) renderHost();
  checkMissionCond(); fbSave();
}

function checkMissionCond(){
  S.missions.forEach(m=>{
    if(m.applied) return;
    if(m.condType==='catch3'&&S.totalCaught>=3){ m.applied=true; applyMissionReward(m.rewType); }
    else if(m.condType==='catch5'&&S.totalCaught>=5){ m.applied=true; applyMissionReward(m.rewType); }
    else if(m.condType==='catch10'&&S.totalCaught>=10){ m.applied=true; applyMissionReward(m.rewType); }
    else if(m.condType==='time10'&&S.timerSec<=600){ m.applied=true; applyMissionReward(m.rewType); }
  });
}
function applyMissionReward(rewType){
  if(rewType==='time5'){ S.timerSec+=300; updateTimerUI(); }
  else if(rewType==='time10'){ S.timerSec+=600; updateTimerUI(); }
  else if(rewType==='shrink5'){ S.timerSec=Math.max(0,S.timerSec-300); updateTimerUI(); }
  else if(rewType==='revive1'||rewType==='revive2'){
    const n=rewType==='revive1'?1:2;
    const dead=getRunners().filter(r=>r.caught||r.dead).sort(()=>Math.random()-.5).slice(0,n);
    dead.forEach(r=>{ r.caught=false; r.dead=false; r.code=genCode(); if(S.currentUser&&S.currentUser.username===r.username){ const cd=$('runner-code-display'); if(cd) cd.textContent=r.code; showReleaseAnim(); } });
    if(dead.length>0) broadcast({text:'獎勵：'+dead.map(r=>r.displayName).join('、')+' 獲得復活',style:'success',type:'system'});
    updateCircles();
  } else if(rewType==='del1'||rewType==='del2'){
    const n=rewType==='del1'?1:2;
    const hunters=aliveHunters().sort(()=>Math.random()-.5).slice(0,n);
    hunters.forEach(h=>{ h.removed=true; });
    if(hunters.length>0) broadcast({text:'獎勵：'+hunters.map(h=>h.displayName).join('、')+' 已被移除',style:'danger',type:'system'});
    updateCircles();
  }
}

// ── REPORT CAPTURE CHECK ───────────────────────────────────────────────
function checkReportCapture(capturedUsername){
  Object.keys(S.pendingReport).forEach(reporterId=>{
    if(S.pendingReport[reporterId]!==capturedUsername) return;
    const report=S.reports.find(r=>r.reporterId===reporterId&&r.targetId===capturedUsername&&r.firstReport&&!r.captureCredited);
    if(report){
      report.captureCredited=true;
      const diff=timeDiffSec(report.time,nowStr());
      if(diff<=180){
        grantImmunityCard(reporterId);
        broadcast({text:'有逃亡者於 '+nowStr()+' 獲得一張免死金牌（透過成功檢舉）',style:'info',type:'announce'});
        const reporter=accOf(reporterId);
        if(reporter) S.hostOnlyMsgs.unshift({text:reporter.displayName+' 在3分鐘內完成有效檢舉，獲得免死金牌',time:nowStr()});
        if(S.currentUser&&S.currentUser.username===reporterId){ renderImmunityCard(); showParaToast('恭喜獲得免死金牌','點擊金牌查看代碼','info'); }
        if(S.hostTabIdx===0) renderHost();
      }
      if(S.currentUser&&S.currentUser.username===reporterId) showParaToast('追蹤目標已被抓捕','可繼續檢舉下一人','info');
    }
    delete S.pendingReport[reporterId];
  });
}
function timeDiffSec(t1,t2){ const p=s=>s.split(':').map(Number); const [a,b]=[p(t1),p(t2)]; return Math.abs((a[0]*3600+a[1]*60+(a[2]||0))-(b[0]*3600+b[1]*60+(b[2]||0))); }
function grantImmunityCard(username){ if(!S.immunityCards[username]) S.immunityCards[username]=[]; const code=genCode(); S.immunityCards[username].push({code,used:false,flipped:false}); return code; }

// ── BROADCAST ──────────────────────────────────────────────────────────
const msgCls = style => style==='danger'?'md':style==='success'?'ms':style==='info'?'mi':style==='mission'?'mm':'ma';
function broadcast(msg){ msg.time=msg.time||nowStr(); S.messages.push(msg); updateMsgDisplays(); }
function broadcastCapture(hostTxt, hunterTxt, runnerTxt){
  const time=nowStr();
  S.messages.push({text:hostTxt,style:'danger',type:'capture',time,_runnerText:runnerTxt});
  S.hunterMsgs.push({text:hunterTxt,style:'danger',type:'capture',time});
  updateMsgDisplays();
}
function updateMsgDisplays(){
  renderMsgEl('runner-messages','runner');
  renderMsgEl('hunter-messages','hunter');
  if(S.hostTabIdx===3) renderHost();
}

// ── DROPDOWN MESSAGE ITEMS ─────────────────────────────────────────────
function msgItem(m, idx){
  const cls = msgCls(m.style);
  const shortText = m.text.length>40 ? m.text.substring(0,40)+'...' : m.text;
  return '<div class="msg-item mb '+cls+'" onclick="toggleMsg(this)">'+
    '<div class="msg-item-header">'+
    '<span class="mt_">'+m.time+'</span>'+
    '<span style="flex:1;margin-left:8px;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+shortText+'</span>'+
    '<span class="msg-arrow">▼</span>'+
    '</div>'+
    '<div class="msg-item-body"><div class="mx" style="font-size:.9rem;white-space:pre-wrap">'+m.text+'</div></div>'+
    '</div>';
}
function toggleMsg(el){
  const body=el.querySelector('.msg-item-body');
  const arrow=el.querySelector('.msg-arrow');
  if(!body) return;
  const open=body.classList.toggle('open');
  if(arrow) arrow.classList.toggle('open',open);
}

function renderMsgEl(elId, role){
  const el=$(elId); if(!el) return;
  const msgs = role==='hunter'
    ? S.hunterMsgs.concat(S.messages.filter(m=>m.type!=='capture')).sort((a,b)=>a.time>b.time?-1:1).slice(0,25)
    : S.messages.slice().reverse().slice(0,25);
  let h='';
  msgs.forEach((m,i)=>{
    if(m.forHostOnly) return;
    let txt=m.text; if(role==='runner'&&m._runnerText) txt=m._runnerText;
    const mCopy={...m,text:txt};
    h+=msgItem(mCopy,i);
  });
  el.innerHTML=h;
}

function selectReportTarget(card, username){ document.querySelectorAll('.rpt-card').forEach(c=>c.classList.remove('sel')); card.classList.add('sel'); _reportSelectedTarget=username; const s=$('rpt-step2'); if(s) s.style.display='block'; }
function setReportMode(mode){ const sw=$('rpt-sel-wrap'),tw=$('rpt-txt-wrap'); if(sw) sw.style.display=mode==='sel'?'block':'none'; if(tw) tw.style.display=mode==='txt'?'block':'none'; }
function submitReport(){
  if(!_reportSelectedTarget){ alert('請選擇對象'); return; }
  const locEl=$('rpt-loc-sel'), textEl=$('rpt-txt-inp');
  const desc=(locEl&&locEl.value)||(textEl&&textEl.value.trim())||'';
  if(!desc){ alert('請填寫地點'); return; }
  const reporter=S.currentUser, target=accOf(_reportSelectedTarget); if(!reporter||!target) return;
  const isFirstOverall=!S.reports.some(r=>r.targetId===target.username&&r.firstReport);
  const hasReportedBefore=S.reports.some(r=>r.reporterId===reporter.username&&r.targetId===target.username&&r.firstReport);
  const firstReport=isFirstOverall&&!hasReportedBefore;
  S.reports.push({reporterId:reporter.username,targetId:target.username,text:desc,time:nowStr(),firstReport,captureCredited:false});
  if(firstReport){
    S.pendingReport[reporter.username]=target.username;
    if(!S.reportSuccessCount[reporter.username]) S.reportSuccessCount[reporter.username]=0;
    S.reportSuccessCount[reporter.username]++;
    updateRunnerReportCount();
    S.hunterMsgs.push({text:target.displayName+' 疑似在 '+desc,style:'info',type:'report',time:nowStr()});
    renderMsgEl('hunter-messages','hunter');
    S.hostOnlyMsgs.unshift({text:'[檢舉] '+reporter.displayName+' 檢舉 '+target.displayName+' 位於 '+desc,time:nowStr()});
    if(S.hostTabIdx===0) renderHost();
    fbSave();
  } else { setTimeout(()=>alert('檢舉失敗：此人已被他人先行檢舉，或你已對此人完成過一次有效檢舉'),100); }
  const mo=document.querySelector('.m-ov'); if(mo) mo.remove();
  _reportSelectedTarget=null;
}

function renderHunterTabContent(){
  const c=$('hunter-tab-content'); if(!c) return;
  if(_hunterTabIdx===0){
    // Main: capture input + messages
    c.innerHTML=
      '<div style="font-size:.75rem;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:6px">輸入代碼抓捕逃亡者</div>'+
      '<div class="row">'+
      '<input class="ipt" id="capture-input" placeholder="0000" maxlength="4" inputmode="numeric" style="flex:1;font-size:1.2rem;letter-spacing:4px;text-align:center" oninput="this.value=this.value.replace(/[^0-9]/g,\'\')">'+
      '<button class="btn btn-danger" id="capture-btn" onclick="doCapture()" style="flex:0 0 64px">抓捕</button>'+
      '</div>'+
      '<hr class="div"><div style="font-size:.75rem;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:8px">情報</div>'+
      '<div id="hunter-messages"></div>';
    renderMsgEl('hunter-messages','hunter');
    setPauseState();
  } else {
    // Chat
    c.innerHTML=
      '<div style="font-size:.75rem;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:8px">獵人通訊頻道</div>'+
      '<div id="hunter-chat" style="flex:1;overflow-y:auto;max-height:55vh;margin-bottom:10px"></div>'+
      '<div class="row">'+
      '<input class="ipt" id="hunter-chat-input" placeholder="傳送給所有獵人..." style="flex:1">'+
      '<button class="btn btn-secondary btn-sm" id="hunter-send-btn" onclick="sendHunterMsg()">傳送</button>'+
      '</div>';
    renderHunterChat();
    setPauseState();
  }
}

function renderHunterChat(){
  const el=$('hunter-chat'); if(!el) return;
  let h='';
  S.hunterChat.slice().reverse().slice(0,30).forEach(m=>{ h+='<div class="mb '+(m.sys?'md':'')+'"><span class="mt_">'+m.time+'</span><div class="mx">'+(m.sender?'<strong style="color:rgba(255,255,255,0.6)">'+m.sender+': </strong>':'')+m.text+'</div></div>'; });
  el.innerHTML=h;
}
function pushHunterMsg(text, sys){ S.hunterChat.push({text,time:nowStr(),sys:!!sys,sender:''}); renderHunterChat(); }
function sendHunterMsg(){
  if(S.paused) return;
  const el=$('hunter-chat-input'); const t=el.value.trim(); if(!t) return;
  S.hunterChat.push({sender:S.currentUser?S.currentUser.displayName:'獵人',text:t,time:nowStr()});
  el.value=''; renderHunterChat(); fbSave();
}
